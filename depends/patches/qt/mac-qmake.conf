# qmake configuration for macOS with clang

QMAKE_CC                = clang
QMAKE_CXX               = clang++

QMAKE_CFLAGS            = -pipe
QMAKE_CXXFLAGS          = -pipe -stdlib=libc++

QMAKE_LFLAGS            = -headerpad_max_install_names
QMAKE_LFLAGS_RELEASE    = -dead_strip
QMAKE_LFLAGS_DEBUG      = -g

QMAKE_LINK              = clang++
QMAKE_LINK_SHLIB        = clang++

QMAKE_AR                = ar cq
QMAKE_OBJCOPY           = objcopy
QMAKE_NM                = nm -P
QMAKE_RANLIB            = ranlib -s

QMAKE_STRIP             = strip
QMAKE_STRIPFLAGS_LIB    += -x

QMAKE_INCDIR            =
QMAKE_LIBDIR            =
QMAKE_INCDIR_X11        =
QMAKE_LIBDIR_X11        =
QMAKE_INCDIR_OPENGL     =
QMAKE_LIBDIR_OPENGL     =

QMAKE_LIBS              = -framework Foundation -framework ApplicationServices
QMAKE_LIBS_DYNLOAD      = -ldl
QMAKE_LIBS_X11          = -lXext -lX11 -lm
QMAKE_LIBS_OPENGL       = -framework OpenGL
QMAKE_LIBS_OPENGL_ES2   = -framework OpenGLES
QMAKE_LIBS_THREAD       = -lpthread

QMAKE_MACOSX_DEPLOYMENT_TARGET = 10.12

QMAKE_APP_FLAG          = -Wl,-headerpad_max_install_names
QMAKE_APPBUNDLE_FLAG    = -Wl,-headerpad_max_install_names

QMAKE_FIX_RPATH         = install_name_tool -id
QMAKE_RPATH             = 
QMAKE_RPATHDIR          = 

QMAKE_LFLAGS_SONAME     = -install_name$${LITERAL_WHITESPACE}
QMAKE_LFLAGS_VERSION    = -current_version$${LITERAL_WHITESPACE}
QMAKE_LFLAGS_COMPAT_VERSION = -compatibility_version$${LITERAL_WHITESPACE}

QMAKE_LFLAGS_APP        = -Wl,-headerpad_max_install_names
QMAKE_LFLAGS_SHAREDLIB  = -dynamiclib
QMAKE_LFLAGS_PLUGIN     = -bundle
QMAKE_LFLAGS_SONAME     = -install_name$${LITERAL_WHITESPACE}
QMAKE_LFLAGS_THREAD     = -pthread

QMAKE_CFLAGS_RELEASE_WITH_DEBUGINFO = -g -O2
QMAKE_CXXFLAGS_RELEASE_WITH_DEBUGINFO = -g -O2

QMAKE_CFLAGS_DEBUG      = -g
QMAKE_CXXFLAGS_DEBUG    = -g

QMAKE_CFLAGS_RELEASE    = -O2
QMAKE_CXXFLAGS_RELEASE  = -O2

QMAKE_CFLAGS_APP        = -fPIC
QMAKE_CXXFLAGS_APP      = -fPIC

QMAKE_CFLAGS_STATIC_LIB = -fPIC
QMAKE_CXXFLAGS_STATIC_LIB = -fPIC

QMAKE_CFLAGS_SHARED_LIB = -fPIC
QMAKE_CXXFLAGS_SHARED_LIB = -fPIC

QMAKE_CFLAGS_PLUGIN     = -fPIC
QMAKE_CXXFLAGS_PLUGIN   = -fPIC

QMAKE_CFLAGS_SONAME     = -fPIC
QMAKE_CXXFLAGS_SONAME   = -fPIC

QMAKE_CFLAGS_THREAD     = -pthread
QMAKE_CXXFLAGS_THREAD   = -pthread

QMAKE_CFLAGS_HIDESYMS   = -fvisibility=hidden
QMAKE_CXXFLAGS_HIDESYMS = -fvisibility=hidden

QMAKE_CFLAGS_PRECOMPILE = -x c-header -c ${QMAKE_PCH_INPUT} -o ${QMAKE_PCH_OUTPUT}
QMAKE_CXXFLAGS_PRECOMPILE = -x c++-header -c ${QMAKE_PCH_INPUT} -o ${QMAKE_PCH_OUTPUT}

QMAKE_CFLAGS_USE_PRECOMPILE = -include ${QMAKE_PCH_OUTPUT}
QMAKE_CXXFLAGS_USE_PRECOMPILE = -include ${QMAKE_PCH_OUTPUT}

QMAKE_CFLAGS_WARN_ON    = -Wall -W
QMAKE_CXXFLAGS_WARN_ON  = -Wall -W

QMAKE_CFLAGS_WARN_OFF   = -w
QMAKE_CXXFLAGS_WARN_OFF = -w

QMAKE_CFLAGS_RELEASE_WITH_DEBUGINFO = -g -O2
QMAKE_CXXFLAGS_RELEASE_WITH_DEBUGINFO = -g -O2

QMAKE_CFLAGS_DEBUG      = -g
QMAKE_CXXFLAGS_DEBUG    = -g

QMAKE_CFLAGS_RELEASE    = -O2
QMAKE_CXXFLAGS_RELEASE  = -O2

QMAKE_CFLAGS_APP        = -fPIC
QMAKE_CXXFLAGS_APP      = -fPIC

QMAKE_CFLAGS_STATIC_LIB = -fPIC
QMAKE_CXXFLAGS_STATIC_LIB = -fPIC

QMAKE_CFLAGS_SHARED_LIB = -fPIC
QMAKE_CXXFLAGS_SHARED_LIB = -fPIC

QMAKE_CFLAGS_PLUGIN     = -fPIC
QMAKE_CXXFLAGS_PLUGIN   = -fPIC

QMAKE_CFLAGS_SONAME     = -fPIC
QMAKE_CXXFLAGS_SONAME   = -fPIC

QMAKE_CFLAGS_THREAD     = -pthread
QMAKE_CXXFLAGS_THREAD   = -pthread

QMAKE_CFLAGS_HIDESYMS   = -fvisibility=hidden
QMAKE_CXXFLAGS_HIDESYMS = -fvisibility=hidden

QMAKE_CFLAGS_PRECOMPILE = -x c-header -c ${QMAKE_PCH_INPUT} -o ${QMAKE_PCH_OUTPUT}
QMAKE_CXXFLAGS_PRECOMPILE = -x c++-header -c ${QMAKE_PCH_INPUT} -o ${QMAKE_PCH_OUTPUT}

QMAKE_CFLAGS_USE_PRECOMPILE = -include ${QMAKE_PCH_OUTPUT}
