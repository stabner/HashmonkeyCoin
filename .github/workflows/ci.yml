name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils python3
        sudo apt-get install -y libssl-dev libevent-dev libboost-system-dev libboost-filesystem-dev libboost-chrono-dev libboost-program-options-dev libboost-test-dev libboost-thread-dev
        sudo apt-get install -y libdb-dev libdb++-dev
        sudo apt-get install -y libminiupnpc-dev libzmq3-dev
        sudo apt-get install -y libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools
        sudo apt-get install -y libqrencode-dev
        sudo apt-get install -y libprotobuf-dev protobuf-compiler
    
    - name: Build
      run: |
        ./autogen.sh
        ./configure --enable-debug=${{ matrix.build_type == 'Debug' }}
        make -j$(nproc)
    
    - name: Run tests
      run: |
        make check
        if [ -f src/test/test_raptoreum ]; then
          src/test/test_raptoreum
        fi

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        # Install vcpkg and dependencies
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg install boost-system boost-filesystem boost-thread boost-chrono boost-program-options boost-test
        .\vcpkg install openssl libevent
        .\vcpkg install zeromq
        .\vcpkg install protobuf
        cd ..
    
    - name: Build
      run: |
        # Note: Windows build process would need to be adapted based on actual build system
        # This is a placeholder for the Windows build process
        echo "Windows build process needs to be implemented based on actual build system"

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        brew install automake libtool pkg-config
        brew install boost libevent
        brew install miniupnpc zeromq
        brew install qt5
        brew install protobuf
    
    - name: Build
      run: |
        ./autogen.sh
        ./configure
        make -j$(sysctl -n hw.ncpu)
    
    - name: Run tests
      run: |
        make check
        if [ -f src/test/test_raptoreum ]; then
          src/test/test_raptoreum
        fi

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install linting tools
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck cppcheck
    
    - name: Run linting
      run: |
        # Run shell script linting
        find . -name "*.sh" -exec shellcheck {} \;
        
        # Run C++ linting (basic checks)
        find src -name "*.cpp" -o -name "*.h" | head -10 | xargs cppcheck --enable=all --error-exitcode=1 || true
